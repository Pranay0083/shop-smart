services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: shopsmart
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      DATABASE_URL: mysql://root:password@db:3306/shopsmart
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 5001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && node src/index.js"

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  db_data:
