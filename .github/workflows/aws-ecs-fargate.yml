name: AWS ECS Fargate Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform
  PROJECT_NAME: shopsmart-pranay
  ECR_REPO_CLIENT: shopsmart-pranay-client
  ECR_REPO_SERVER: shopsmart-pranay-server
  ECS_CLUSTER: shopsmart-pranay-cluster
  ECS_SERVICE_CLIENT: shopsmart-pranay-client
  ECS_SERVICE_SERVER: shopsmart-pranay-server
  IMAGE_TAG: ${{ github.sha }}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Client install
        working-directory: client
        run: npm ci

      - name: Client tests (report)
        working-directory: client
        run: |
          mkdir -p ../reports
          npx vitest run --reporter=json --outputFile=../reports/vitest.json

      - name: Server install
        working-directory: server
        run: npm ci

      - name: Server tests (report)
        working-directory: server
        run: |
          mkdir -p ../reports
          npx jest --ci --json --outputFile=../reports/jest.json

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports

  terraform:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          aws s3api head-bucket --bucket shopsmart-pranay-tfstate 2>/dev/null || \
          aws s3api create-bucket --bucket shopsmart-pranay-tfstate --region ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform fmt
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Import existing resources into state
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          TF_VARS="-var=project_name=${{ env.PROJECT_NAME }} -var=database_url=${{ secrets.DATABASE_URL }} -var=jwt_secret=${{ secrets.JWT_SECRET }}"

          # S3
          terraform import $TF_VARS aws_s3_bucket.artifacts "${{ env.PROJECT_NAME }}" 2>/dev/null
          # ECR
          terraform import $TF_VARS aws_ecr_repository.client "${{ env.PROJECT_NAME }}-client" 2>/dev/null
          terraform import $TF_VARS aws_ecr_repository.server "${{ env.PROJECT_NAME }}-server" 2>/dev/null
          # CloudWatch
          terraform import $TF_VARS aws_cloudwatch_log_group.client "/ecs/${{ env.PROJECT_NAME }}-client" 2>/dev/null
          terraform import $TF_VARS aws_cloudwatch_log_group.server "/ecs/${{ env.PROJECT_NAME }}-server" 2>/dev/null
          # SSM
          terraform import $TF_VARS aws_ssm_parameter.database_url "/${{ env.PROJECT_NAME }}/DATABASE_URL" 2>/dev/null
          terraform import $TF_VARS aws_ssm_parameter.jwt_secret "/${{ env.PROJECT_NAME }}/JWT_SECRET" 2>/dev/null
          # ECS
          terraform import $TF_VARS aws_ecs_cluster.main "shopsmart-pranay-cluster" 2>/dev/null

          echo "Import step complete (errors above are expected for new resources)"
          exit 0

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -out=tfplan \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

  docker:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_CLIENT }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_CLIENT }}:latest

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_SERVER }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_SERVER }}:latest

  ecs:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy services (force new tasks)
        run: |
          aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE_SERVER}" --force-new-deployment
          aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE_CLIENT}" --force-new-deployment
          aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE_SERVER}" "${ECS_SERVICE_CLIENT}"
