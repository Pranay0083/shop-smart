name: CI

on:
  push:
    branches:
      - "main" # Or "**" if you want every branch
  pull_request:
    branches:
      - "main"

jobs:
  # Job 1: Client Build and Test
  client-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: Install dependencies
        run: npm ci # 'npm ci' is faster and more reliable in CI environments

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test -- --run

      - name: Build Client
        run: npm run build

  # Job 2: Server Build and Test
  server-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Server Tests
        run: npm test

      - name: Build Server (if applicable)
        run: npm run build